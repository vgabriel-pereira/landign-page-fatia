<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Fatia da Vida Admin</title>
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

  <main class="login-page">
    <div class="login-card">
      <img class="login-card__logo" src="../assets/logo.png" alt="Fatia da Vida" width="80" height="80" />
      <h1>Área restrita</h1>
      <p>Acesso exclusivo para a administradora do catálogo.</p>

      <div id="login-error" class="login-error" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="email" required placeholder="seu@email.com" />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
          Entrar
        </button>
      </form>
    </div>
  </main>

  <script type="module" src="../js/admin.js"></script>
</body>
</html>
